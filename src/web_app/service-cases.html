<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Santoni AI Knitting Agent Demo - Service Cases</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="changelog-shell service-case-shell">
    <header class="changelog-header">
      <div>
        <p class="eyebrow">Santoni AI Knitting Agent</p>
        <h1>Service Case Library</h1>
      </div>
      <div class="topbar-actions">
        <a class="text-link" href="/docs.html">Project Docs</a>
        <a class="text-link" href="/">Back to Demo</a>
      </div>
    </header>

    <section class="case-summary" aria-label="Service case summary">
      <div class="summary-tile">
        <span>Total Cases</span>
        <strong id="caseCount">0</strong>
      </div>
      <div class="summary-tile">
        <span>Implemented Mock</span>
        <strong id="implementedCount">0</strong>
      </div>
      <div class="summary-tile">
        <span>Needs Review</span>
        <strong id="needsReviewCount">0</strong>
      </div>
      <div class="summary-tile">
        <span>Excel Drafts</span>
        <strong id="draftCount">0</strong>
      </div>
      <div class="summary-tile">
        <span>Approved</span>
        <strong id="approvedCount">0</strong>
      </div>
      <div class="summary-tile">
        <span>Needs Changes</span>
        <strong id="needsChangesCount">0</strong>
      </div>
      <div class="summary-tile">
        <span>Internal Only</span>
        <strong id="internalOnlyCount">0</strong>
      </div>
    </section>

    <section class="version-rule">
      <h2>Case Workflow Status</h2>
      <ul id="casePlanList"></ul>
    </section>

    <section class="case-toolbar" aria-label="Service case filters">
      <input id="caseSearch" type="search" placeholder="Search case, model, symptom, part">
      <select id="statusFilter" aria-label="Review status">
        <option value="">All statuses</option>
      </select>
      <select id="categoryFilter" aria-label="Issue category">
        <option value="">All categories</option>
      </select>
    </section>

    <section id="caseList" class="case-grid" aria-label="Service cases"></section>
    <p id="caseEmpty" class="case-empty" hidden>No matching service cases.</p>
  </main>

  <script src="/service-cases.js?v=0.18.0"></script>
</body>
</html>
